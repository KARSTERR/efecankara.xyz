<p>Benimle iletişime geçmek ister misiniz? Aşağıdaki formu doldurun, mesajınızı gönderin ve en kısa sürede size geri döneceğim!</p>
<form name="sentMessage" id="contactForm" novalidate>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Adınız</label>
      <input type="text" class="form-control" placeholder="Adınız" id="name" required data-validation-required-message="Lütfen adınızı giriniz.">
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Email Adresi</label>
      <input type="email" class="form-control" placeholder="Email Adresi" id="email" required data-validation-required-message="Lütfen email adresinizi giriniz.">
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group col-xs-12 floating-label-form-group controls">
      <label>Telefon Numarası</label>
      <input type="tel" class="form-control" placeholder="Telefon Numarası" id="phone" required data-validation-required-message="Lütfen telefon numaranızı giriniz.">
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Mesaj</label>
      <textarea rows="5" class="form-control" placeholder="Mesaj" id="message" required data-validation-required-message="Lütfen bir mesaj giriniz."></textarea>
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <br>
  <div id="success"></div>
  <div class="form-group">
    <button type="submit" class="btn btn-primary" id="sendMessageButton">Gönder</button>
  </div>
</form>
