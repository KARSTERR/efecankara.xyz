### Site Settings ###
title               : Efe Can Kara
description         : Backend Developer | Mobile App Creator | IoT Enthusiast | Linux Admin
baseurl             : ""            # Change to empty quotes if you are hosting your site at <your-username>.github.io directly
repository          : KARSTERR/efecankara.xyz      # Change to <your-username>/<your-username>.github.io (or remove it if you don't need remote projects)
remote_theme        : yousinix/portfolYOU
open_new_tab        : false                    # Opens external URLs in new tab (works for posts, projects and navbar only)


### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:                                            # The following paths are excluded from navbar
  - pages/tags.html
  - pages/404.html
  - pages/index.md

### Author Info ###
author:
  name              : Efe Can Kara
  image             : https://avatars.githubusercontent.com/u/106669867?v=4
  email             : efecan_kara@proton.me
  github            : KARSTERR
  gitlab            : KARSTERR
  kaggle            : fenityy
  linkedin          : karsterr
# stackoverflow     : your_user_id
# youtube           : your_channel_name


### Posts ###
permalink: /blog/:title


### Collections ###
collections:
  projects:
    output: true
    permalink: /projects/:name



### Disqus ###
disqus:
  shortname: your-short-name-disqus                     # Your website Shortname on disqus


### Analytics ###
analytics:
  enabled: true                                # Set true to enable analytics
  google:
    tracking_id: G-P9S60MH5X3

### Defaults for collections ###
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      comments: false                                   # Set to true to enable disqus comments


### Exclude from processing ###
exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - "*.log"
